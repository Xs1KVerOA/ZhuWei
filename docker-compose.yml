services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/debian-security}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    image: ${APP_IMAGE:-zhuwei:latest}
    container_name: zhuwei-app
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.docker}
    environment:
      DATABASE_BACKEND: postgresql
      DATABASE_URL: "postgresql://${POSTGRES_USER:-zhuwei}:${POSTGRES_PASSWORD:-zhuwei_change_me}@postgres:5432/${POSTGRES_DB:-zhuwei}"
      REDIS_URL: redis://redis:6379/0
      QUEUE_BACKEND: redis
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_change_me}
      NEO4J_ENABLED: "1"
      NEO4J_URI: bolt://neo4j:7687
      BROWSER_PROXY_CONNECT_MODE: container
      BROWSER_PROXY_DOCKER_NETWORK: zhuwei-net
      CLAUDE_CODE_INSTALL_COMMAND: "${CLAUDE_CODE_INSTALL_COMMAND:-npm install -g @anthropic-ai/claude-code --registry=https://registry.npmmirror.com}"
    ports:
      - "${APP_BIND:-0.0.0.0}:${APP_PORT:-8010}:8010"
    volumes:
      - zhuwei_app_data:/app/backend/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      neo4j:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8010/login >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      zhuwei:
        aliases:
          - zhuwei-app

  postgres:
    image: postgres:16-alpine
    container_name: zhuwei-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zhuwei}
      POSTGRES_USER: ${POSTGRES_USER:-zhuwei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zhuwei_change_me}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - zhuwei_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zhuwei} -d ${POSTGRES_DB:-zhuwei}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - zhuwei

  redis:
    image: redis:7-alpine
    container_name: zhuwei-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - zhuwei_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - zhuwei

  minio:
    image: minio/minio:latest
    container_name: zhuwei-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_change_me}
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - zhuwei_minio_data:/data
    networks:
      - zhuwei

  neo4j:
    image: neo4j:5-community
    container_name: zhuwei-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-zhuwei_neo4j_change_me}"
      NEO4J_server_memory_heap_initial__size: "${NEO4J_HEAP_INITIAL:-384m}"
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP_MAX:-384m}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE:-256m}"
      NEO4J_server_jvm_additional: "-XX:+ExitOnOutOfMemoryError"
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - zhuwei_neo4j_data:/data
      - zhuwei_neo4j_logs:/logs
    networks:
      - zhuwei

networks:
  zhuwei:
    name: zhuwei-net

volumes:
  zhuwei_app_data:
  zhuwei_postgres_data:
  zhuwei_redis_data:
  zhuwei_minio_data:
  zhuwei_neo4j_data:
  zhuwei_neo4j_logs:
