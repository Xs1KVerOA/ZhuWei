services:
  postgres:
    image: postgres:16-alpine
    container_name: zhuwei-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zhuwei}
      POSTGRES_USER: ${POSTGRES_USER:-zhuwei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zhuwei_change_me}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - zhuwei_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zhuwei} -d ${POSTGRES_DB:-zhuwei}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: zhuwei-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - zhuwei_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: zhuwei-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_change_me}
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - zhuwei_minio_data:/data

  neo4j:
    image: neo4j:5-community
    container_name: zhuwei-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-zhuwei_neo4j_change_me}"
      NEO4J_server_memory_heap_initial__size: "${NEO4J_HEAP_INITIAL:-384m}"
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP_MAX:-384m}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE:-256m}"
      NEO4J_server_jvm_additional: "-XX:+ExitOnOutOfMemoryError"
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - zhuwei_neo4j_data:/data
      - zhuwei_neo4j_logs:/logs

volumes:
  zhuwei_postgres_data:
  zhuwei_redis_data:
  zhuwei_minio_data:
  zhuwei_neo4j_data:
  zhuwei_neo4j_logs:
