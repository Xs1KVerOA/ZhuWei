<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>烛微 ZhuWei</title>
    <link rel="icon" href="/brand/logo-mark.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: light;
        --ink: #172033;
        --muted: #687386;
        --line: #d8dee8;
        --panel: #ffffff;
        --bg: #f4f7fb;
        --blue: #2563eb;
        --green: #0f766e;
        --red: #b42318;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(420px, calc(100vw - 32px));
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 18px 50px rgba(25, 41, 70, 0.10);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        letter-spacing: 0;
      }
      p {
        margin: 0 0 22px;
        color: var(--muted);
        line-height: 1.6;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 650;
      }
      input {
        width: 100%;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 12px;
        font: inherit;
      }
      button {
        width: 100%;
        height: 44px;
        margin-top: 14px;
        border: 0;
        border-radius: 6px;
        background: var(--blue);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      .error {
        min-height: 22px;
        margin-top: 12px;
        color: var(--red);
        font-size: 14px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
      }
      .mark {
        width: 34px;
        height: 34px;
        display: block;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img class="mark" src="/brand/logo-mark.svg" alt="" />
        <h1>烛微</h1>
      </div>
      <p>输入访问 token 后进入控制台。</p>
      <form id="loginForm">
        <label for="token">Token</label>
        <input id="token" name="token" type="password" autocomplete="current-password" autofocus />
        <button type="submit">进入</button>
        <div class="error" id="error"></div>
      </form>
    </main>
    <script>
      const form = document.querySelector("#loginForm");
      const error = document.querySelector("#error");
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.textContent = "";
        const token = new FormData(form).get("token");
        const response = await fetch("/api/auth/session", {
          method: "POST",
          headers: { "X-App-Token": token || "" },
        });
        if (!response.ok) {
          error.textContent = "Token 无效";
          return;
        }
        const params = new URLSearchParams(location.search);
        location.href = params.get("next") || "/app";
      });
    </script>
  </body>
</html>
